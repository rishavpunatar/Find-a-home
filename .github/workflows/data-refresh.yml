name: Scheduled Data Refresh

on:
  schedule:
    - cron: '15 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild processed outputs
        run: |
          python -m pipeline.jobs.generate_wellbeing_metrics
          python -m pipeline.jobs.build_micro_areas

      - name: Create Pull Request with refreshed data
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore(data): refresh micro-area processed outputs'
          title: 'chore(data): scheduled micro-area data refresh'
          body: |
            Automated refresh of `data/processed` generated by `pipeline.jobs.build_micro_areas`.
          branch: chore/data-refresh
          delete-branch: true
          add-paths: |
            data/raw/wellbeing_metrics.json
            data/processed/**
